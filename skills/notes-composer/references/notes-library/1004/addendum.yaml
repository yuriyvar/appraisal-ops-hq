          -:CONDITION OF THE PROPERTY:- Continued from Condition of the Property: condition. Interior and exterior finishes show signs of normal use and some dated or worn components, and selective repairs, maintenance, or modernization may be beneficial.  The subject remains functional and marketable for continued residential use in its current condition. Any condition-related differences between the subject and the comparable sales were considered in the comparable selection, adjustment process, and final reconciliation. The appraiser is not a home inspector, contractor, or structural engineer, and this appraisal should not be relied upon as a property inspection. The condition conclusion is based on readily observable areas and market-based appraisal analysis as of the effective date.   -:COMMENTS ON SALES COMPARISON:- REVISIONS REQUESTED  The subject property contains three outbuildings consisting of a detached carport, a storage shed, and an additional accessory storage structure. All outbuildings present at the time of inspection were observed and considered during the appraisal process. The detached carport was included in the valuation analysis due to its contributory value and utility to the property. The remaining storage structures are typical accessory improvements commonly found in the market area and are of limited contributory value. Their presence was considered within the overall analysis; however, no separate line-item adjustment was warranted as market participants generally do not recognize a measurable difference in value for these types of minor storage improvements. The appraisal reflects the contributory value of all observed site improvements as supported by market evidence and overall buyer behavior within the subject market area.    Market condition/time adjustments were considered through analysis of available market data as of the effective date of the appraisal. The appraiser reviewed recent and historical sales activity from the local MLS, public record data, competing listings/pendings where available, and market trend indicators within the subject's competitive market area. The analysis considered sale dates, contract dates when available, sale price trends, competing inventory, days on market, list-to-sale price ratios, and the overall consistency of pricing for comparable properties over the prior 12-month period.  Based on the reviewed data, the market was considered generally stable over the relevant period, with no clearly measurable or consistently supported upward or downward trend that would warrant a market condition adjustment. Sales occurring at different points within the analysis period were compared to more recent sales after consideration of location, condition, quality, design, GLA, site utility, and other physical differences. After isolating these differences to the extent possible, no reliable paired-sale or market-supported extraction indicated a meaningful time-based adjustment was warranted. Therefore, no market condition/time adjustments were applied.  The data sources used included MLS closed sale data, public records, active and pending listings where available, and the appraiser's analysis of comparable market activity. The technique used included grouped sales comparison, review of sale/resale and competing property trends where available, comparison of sale prices over time for similar properties, and reconciliation of the available data. The lack of a time adjustment is supported by the absence of a consistent measurable market trend among comparable sales within the subject's competitive market segment.  The prior reconciliation comment has been corrected for clarity. While Comparable Sale 3 reflects the lowest net and gross adjustment percentages, Comparable Sale 1 was given primary weight in the final reconciliation due to its stronger overall comparability to the subject. Comparable Sale 1 is more similar in style, design, utility, and overall market appeal, and is located within a more directly comparable market area. Comparable Sale 3 was considered and provides support; however, it is located farther from the subject and required greater consideration for locational and overall market differences. Therefore, the final opinion of value gives primary weight to Comparable Sale 1 based on overall comparability, not solely on the lowest net/gross adjustment indicators.  Comparable Sale 1's basement finish was reviewed and the reported finished basement area is considered adequately supported. While portions of the basement include lower-quality wall finish, plastic sheeting, exposed/utility-style areas, and laundry/storage areas with no finished treatment, the basement also includes finished and usable areas with flooring, electricity, and central HVAC service. The basement was not considered equivalent to above-grade living area or high-quality finished basement area, and the contributory value was adjusted accordingly.  The unfinished/utility portions, including the laundry area and areas with limited or no finish, were considered in the analysis. The overall basement adjustment reflects the mixed level of finish and functional utility, rather than treating the entire lower level as fully finished living area. Therefore, no further revision is warranted beyond the analysis already reflected in the report.           The most recent comparable sales data in closest proximity to the subject was utilized in the market approach.  It (was) necessary for the appraiser to widen the market search to obtain comparables with similar utility, style, effective age and sales data reflective of current market conditions. Based on appraisal practice with emphasis placed on weighing the elements of comparison, the sales chosen represent the best indication of the subject's current market value. In the appraiser's opinion, the sales chosen best weigh the elements of comparison, and while the distance from the subject property is very import