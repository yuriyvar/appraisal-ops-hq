          Clarification of Intended Use and Intended User:  The Intended User of this appraisal report is the Lender/Client. The Intended Use is to evaluate the property that is the subject of this appraisal for a mortgage finance transaction, subject to the stated Scope of Work, purpose of the appraisal, reporting requirements of this appraisal report form, and Definition of Market Value. No additional Intended Users are identified by the appraiser                                                                                                                                                                                                                                   .                                                                                                                                   Exposure time is defined as the estimated length of time that the property interest would have been offered on the market prior to the hypothetical consummation of a sale at market value on the effective date of this appraisal.Exposure time for the subject was between 0 to 90 days.                                                                                                                                                                                                          Prior Services: The appraiser has not performed any service in any capacity on the subject property in the last 3 years from the effective date of this appraisal                                                                                                                                                                                                                                                                                                                                                         Sales comparison note: Due to current market conditions, it becomes necessary to expand normal search parameters. Additionally, due to the lack of comparables, it then becomes necessary to make adjustments to the comps that may or may not exceed guidelines. There are only a limited number of sales similar to the subject in the subject's mls zone. It is the appraiser's responsibility to research, analyze, and select the most similar market data available from which to develop a credible, and supportable appraisal of the subject property. Furthermore, not all adjustments in the sales comparison analysis can be directly extracted or supported by the available market data with a high degree of accuracy. Some adjustments have an element of subjectivity and professional judgement which the appraiser has applied, based on prior observations of the reactions of typical/knowledgeable buyers and sellers in the marketplace. This method is a standard and well accepted practice within the appraisal industry. All interested parties are encouraged to have an understanding of basic valuation practices when appraising atypical or complex properties when there is an absence of like elements of comparison, or in an instance when the market data is inconsistent with which to draw better supported conclusions.   Appraisal fee: {money}  Condition adjustments are determined by information obtained from the local MLS database and visual observation, via pictures included within those MLS sheets which advise of the current condition of the comparable sale.  All utilities were on and operating at time of inspection. Adjustments were made to several features of the comparables depreciated cost analysis.  This property was measured using ANSI standards. Finished square footage calculations for this house were made based on measured dimensions only and may include unfinished areas, openings in floors not associated with stairs, or openings in floors exceeding the area of associated stairs. Well and septic is common for the area and there is no public hookup available. The subject is zoned agricultural but there is no farming or cultivation beign done on the property.                                                               In the comparative market analysis, site, location, quality of construction, bedroom count, date of sale, view, and age adjustments were not applied due to the high degree of similarity among the subject property and the selected comparables. All properties in this analysis are characterized by comparable site attributes, including similar lot sizes, shapes, and utilities. Additionally, their locations within the same neighborhood provide equivalent environmental and locational benefits. This uniformity in site characteristics suggests that their impact on market value is consistent across the properties, negating the need for specific adjustments.   Summary of Highest & Best Use-  A highest and best use analysis identifies the most probable and profitable competitive use the subject poperty could be used for. This analysis is an essential step in the determination of market value because it forms a framework for the proper selection of comparables. The highest and best use of the property is analyzed both as if vacant and as improved. The reasonably probable and legal use of vacant land or an improved property, which is physically possible, appropriately supported, financially feasible, and results in the highest value. The four criteria the highest and best use meet are legally permissible, physically possible, financially feasible, and maximally productivity.  This analysis concluded that the highest and best use in single family residential.  Final Reconciliation-  Homes in the subject's market area are not typically purchased for income production and the income approach to value is not an appropriate indicator of market value. The cost approach to value is not a reliable indicator of value with older properties due to the lack of accuracy in estimating depreciation and reproductive costs. The sales comparison approach to value is given the most consideration because of the quality of the sales data available and because