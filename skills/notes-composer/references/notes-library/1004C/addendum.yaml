          -:HUD DATA PLATE:- Per  owner, no HUD plate present on property and it was removed from the property, client to confirm Certifificate availability   -:CONDITION OF THE PROPERTY:- The subject is considered to be in C3 condition. The dwelling has been adequately maintained and shows normal physical depreciation for its age. No significant deferred maintenance, structural concerns, or major repairs were observed at the time of inspection. The improvements remain functional, marketable, and typical for the local market. Any minor wear noted is considered normal and does not adversely impact the overall habitability or marketability of the property.   -:PHYSICAL DEFICIENCIES OR ADVERSE CONDITIONS:- The appraiser can only describe what can be visibly observed given that the appraiser is not qualified as a home inspector and therefore does not warrant physical deficiencies or adverse conditions that affect the livability, soundness, or structural integrity of the property. Any visible signs of physical defeciencies or adverse conditions have been noted.   -:COMMENTS ON SALES COMPARISON:- The subject is an FHA manufactured home assignment involving a property with water feature/pond-type influence and limited directly comparable market data. The subject property is located on or near a pond/water feature, which is considered a favorable site amenity in the local market. However, the subject's specific combination of property characteristics, including manufactured housing, larger-than-typical gross living area, rural/semi-rural location, site utility, and water feature/access influence, is uncommon for the immediate market area.  The appraiser completed an expanded comparable search and found no recent closed manufactured home sales within a 25-mile radius that bracket the subject's specific water feature, pond setting, or water access characteristics while also being similar in size, condition, quality, age, location, and overall market appeal. Comparable manufactured home sales in the subject's market area are limited, and properties with similar water-oriented amenities are even more limited. As a result, the comparable selection prioritized the best available manufactured home sales with the most similar overall market appeal, design, utility, and physical characteristics, rather than relying solely on proximity or one individual feature.  The subject is also larger than what is typically observed for manufactured homes in this market. Due to the limited number of similar larger manufactured home sales, some comparables vary in size and other physical characteristics. Adjustments were applied where supported and considered necessary to account for differences in gross living area, site/view/water influence, condition, quality, age, and other contributory features. The water feature/water access adjustment was developed from the best available market evidence, including paired or grouped market indications where available, comparison to properties with other similar amenity-based site influences, and the appraiser's judgment based on observed market reaction. No perfect paired sale was available due to the limited data; therefore, the adjustment reflects the contributory value of the amenity as supported by the available comparable data and overall market behavior.  The lack of exact bracketing for the water feature does not indicate a lack of marketability. Rather, it reflects the limited availability of directly comparable manufactured home sales with the same specific amenity. The subject's water feature/pond-type setting is considered a positive influence, but it is not considered to create an adverse marketability issue or an over-improvement concern. The subject remains marketable as a manufactured home in the local market, with the water feature being treated as a contributory amenity rather than the sole driver of value.  Because of the limited availability of directly comparable sales, the appraiser expanded the search geographically and considered the most relevant sales available. The final comparable sales used are considered the best available indicators of market value after adjustment. Greater emphasis was placed on the comparables most similar in overall market appeal, manufactured housing design, location, utility, and adjusted value indication. The value conclusion reflects the subject's larger-than-typical manufactured home size, water feature/pond-type influence, and the limited but relevant market data available as of the effective date of the appraisal.   The most recent comparable sales data in closest proximity to the subject was utilized in the market approach.  It (was) necessary for the appraiser to widen the market search to obtain comparables with similar utility, style, effective age and sales data reflective of current market conditions. Based on appraisal practice with emphasis placed on weighing the elements of comparison, the sales chosen represent the best indication of the subject's current market value. In the appraiser's opinion, the sales chosen best weigh the elements of comparison, and while the distance from the subject property is very important, various factors within the elements of comparison require a wider than one mile radius search.  The adjustments for site are based on market abstraction and contributory value. Above a certain point each additional increment of land area contributes less on a per acre or per square foot basis than the initial minimum site size for the area, thus a constant dollar per acre or square foot adjustment was not utilized. This concept relates to diminishing marginal utility. All physical factors of the subject and comparable sites have been weighing in arriving at site adjustments or lack thereof.  The age adjustments utilized in this report considers both the chronological and effective ages of the subject and the comparables. Points of consideration are buyer preference for newer homes, wear and tear on